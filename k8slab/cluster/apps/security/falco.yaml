---
# Falco — runtime security monitoring.
# DaemonSet on every node, modern_ebpf driver (CO-RE, no kernel headers needed).
# Custom rules: credential file reads, shell-in-container, env var theft.
# Falco Sidekick routes alerts → Alertmanager + Loki.
#
# Trigger a detection:
#   kubectl run test --image=alpine --restart=Never -- sh -c 'cat /etc/shadow && sleep 5'

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: "*"
    helm:
      values: |
        driver:
          kind: modern_ebpf

        collectors:
          containerd:
            enabled: true
            socket: /run/k3s/containerd/containerd.sock

        falco:
          json_output: true
          log_level: info
          rules_file:
            - /etc/falco/falco_rules.yaml
            - /etc/falco/falco_rules.local.yaml
            - /etc/falco/rules.d

        customRules:
          rules-lab.yaml: |-
            - rule: Read Sensitive Credential Files
              desc: >
                Container reads /etc/shadow or /etc/passwd.
                First thing an attacker does after container escape to find credentials.
              condition: >
                open_read and container and
                fd.name in (/etc/shadow, /etc/passwd, /etc/sudoers)
              output: >
                Credential file read in container
                (user=%user.name cmd=%proc.cmdline file=%fd.name
                container=%container.name image=%container.image.repository
                pod=%k8s.pod.name ns=%k8s.ns.name)
              priority: WARNING
              tags: [lab, credential_access, T1555]

            - rule: Shell Spawned in Container
              desc: >
                Interactive shell opened inside a running container.
                Common first move after an attacker establishes a foothold.
              condition: >
                spawned_process and container and
                proc.name in (bash, sh, zsh, dash) and
                not proc.pname in (bash, sh, zsh, dash, tini, runc, containerd-shim)
              output: >
                Shell spawned in container
                (user=%user.name shell=%proc.name parent=%proc.pname
                container=%container.name image=%container.image.repository
                pod=%k8s.pod.name ns=%k8s.ns.name)
              priority: NOTICE
              tags: [lab, execution, T1059]

            - rule: Read Process Environment Variables
              desc: >
                Container reads /proc/*/environ.
                Used to steal secrets from other processes' environment variables.
              condition: >
                open_read and container and
                fd.name glob "/proc/*/environ"
              output: >
                Process environ file read in container
                (user=%user.name cmd=%proc.cmdline file=%fd.name
                container=%container.name image=%container.image.repository
                pod=%k8s.pod.name ns=%k8s.ns.name)
              priority: WARNING
              tags: [lab, credential_access, T1552]

        falcosidekick:
          enabled: true
          config:
            alertmanager:
              hostport: "http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093"
              minimumpriority: "notice"
            loki:
              hostport: "http://loki.monitoring.svc.cluster.local:3100"
              minimumpriority: "notice"

        tolerations:
          - operator: Exists

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: falco

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
