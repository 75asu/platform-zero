---
- name: Start MiniSky + MinIO on homelab
  hosts: gcplab
  gather_facts: false

  vars:
    gcplab_dir: ~/gcplab

  tasks:
    - name: Verify Docker is installed
      command: docker --version
      changed_when: false
      register: docker_check
      failed_when: docker_check.rc != 0

    - name: Create gcplab working directory
      file:
        path: "{{ gcplab_dir }}"
        state: directory
        mode: "0755"

    - name: Copy docker-compose.yml
      copy:
        src: ../docker-compose.yml
        dest: "{{ gcplab_dir }}/docker-compose.yml"

    - name: Copy Dockerfile
      copy:
        src: ../Dockerfile
        dest: "{{ gcplab_dir }}/Dockerfile"

    - name: Copy nginx.conf
      copy:
        src: ../nginx.conf
        dest: "{{ gcplab_dir }}/nginx.conf"

    # ── Build MiniSky image on the homelab ─────────────────────────────────────

    - name: Build MiniSky Docker image
      shell: docker compose build minisky
      args:
        chdir: "{{ gcplab_dir }}"
      register: build_result
      changed_when: true

    - name: Show build output
      debug:
        var: build_result.stdout_lines

    # ── Start containers ────────────────────────────────────────────────────────

    - name: Start MiniSky and MinIO
      shell: docker compose up -d minisky minio
      args:
        chdir: "{{ gcplab_dir }}"

    - name: Wait for MiniSky API port to be open
      wait_for:
        host: localhost
        port: 8082
        timeout: 60
        state: started

    - name: Run minio-init (create state bucket)
      block:
        - shell: docker compose up minio-init
          args:
            chdir: "{{ gcplab_dir }}"
          register: minio_init
          changed_when: false
      rescue:
        - name: MinIO logs (diagnosis)
          shell: docker logs gcplab-minio
          args:
            chdir: "{{ gcplab_dir }}"
          ignore_errors: true
        - fail:
            msg: "minio-init failed. Check MinIO logs above."

    # ── Start nginx proxy ───────────────────────────────────────────────────────
    # nginx rewrites Host headers per port so MiniSky sees the correct GCP domain.
    # No /etc/hosts overrides or iptables rules needed on the local machine.

    - name: Start minisky-proxy (nginx)
      shell: docker compose up -d minisky-proxy
      args:
        chdir: "{{ gcplab_dir }}"

    - name: Reload nginx config (picks up changes on re-runs without downtime)
      shell: docker compose exec -T minisky-proxy nginx -s reload
      args:
        chdir: "{{ gcplab_dir }}"
      ignore_errors: true  # container may not be ready yet on first run; wait_for below catches that

    - name: Wait for nginx proxy port (storage, 8090) to be open
      wait_for:
        host: localhost
        port: 8090
        timeout: 30
        state: started

    - name: Wait for nginx proxy port (bigquery, 8099) to be open
      wait_for:
        host: localhost
        port: 8099
        timeout: 30
        state: started

    - name: Ready
      debug:
        msg:
          - "MiniSky is up.    → http://{{ ansible_host }}:8082"
          - "MiniSky UI.       → http://{{ ansible_host }}:8083"
          - "MinIO is up.      → http://{{ ansible_host }}:9002"
          - "MinIO console.    → http://{{ ansible_host }}:9003"
          - "Proxy ports:        8090-8099 (storage/iam/pubsub/container/bigquery/...)"
