# MiniSky reverse proxy
# MiniSky routes requests by Host header (GCP domain name), not by IP.
# nginx listens on one port per GCP service and rewrites the Host header
# before proxying to MiniSky on 8082. This lets root.hcl point the Google
# Terraform provider directly at the homelab IP with no /etc/hosts overrides.
#
# Port map:
#   8090  storage.googleapis.com
#   8091  iam.googleapis.com
#   8092  cloudresourcemanager.googleapis.com
#   8093  pubsub.googleapis.com
#   8094  secretmanager.googleapis.com
#   8095  sqladmin.googleapis.com
#   8096  artifactregistry.googleapis.com
#   8097  run.googleapis.com
#   8098  container.googleapis.com
#   8099  bigquery.googleapis.com

events {}

http {
    server {
        listen 8090;
        location / {
            proxy_set_header Host "storage.googleapis.com";
            proxy_pass       http://127.0.0.1:8082;
        }
    }

    server {
        listen 8091;
        location / {
            proxy_set_header Host "iam.googleapis.com";
            proxy_pass       http://127.0.0.1:8082;
        }
    }

    server {
        listen 8092;
        location / {
            proxy_set_header Host "cloudresourcemanager.googleapis.com";
            proxy_pass       http://127.0.0.1:8082;
        }
    }

    server {
        listen 8093;
        location / {
            proxy_set_header Host "pubsub.googleapis.com";
            proxy_pass       http://127.0.0.1:8082;
        }
    }

    server {
        listen 8094;
        location / {
            proxy_set_header Host "secretmanager.googleapis.com";
            proxy_pass       http://127.0.0.1:8082;
        }
    }

    server {
        listen 8095;
        location / {
            proxy_set_header Host "sqladmin.googleapis.com";
            proxy_pass       http://127.0.0.1:8082;
        }
    }

    server {
        listen 8096;
        location / {
            proxy_set_header Host "artifactregistry.googleapis.com";
            proxy_pass       http://127.0.0.1:8082;
        }
    }

    server {
        listen 8097;
        location / {
            proxy_set_header Host "run.googleapis.com";
            proxy_pass       http://127.0.0.1:8082;
        }
    }

    server {
        listen 8098;
        location / {
            proxy_set_header Host "container.googleapis.com";
            proxy_pass       http://127.0.0.1:8082;
        }
    }

    server {
        listen 8099;
        location / {
            proxy_set_header Host "bigquery.googleapis.com";
            proxy_pass       http://127.0.0.1:8082;
        }
    }
}
