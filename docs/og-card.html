<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 627px;
      background: #05060f;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    .bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: #818cf8;
    }

    .bg-letter {
      position: absolute;
      right: 40px;
      top: -20px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 500px;
      line-height: 1;
      color: rgba(129, 140, 248, 0.04);
      user-select: none;
      letter-spacing: -10px;
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 60px 80px 60px 86px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 26px;
      color: #c7d2fe;
      letter-spacing: -0.5px;
    }

    .brand .z { color: #818cf8; }

    .brand-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #818cf8;
      margin-top: 3px;
      flex-shrink: 0;
    }

    .badge {
      font-family: 'Fragment Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: #818cf8;
      border: 1.5px solid rgba(129, 140, 248, 0.25);
      padding: 5px 12px;
      border-radius: 4px;
    }

    .headline {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 60px;
      line-height: 1.08;
      letter-spacing: -2px;
      color: #c7d2fe;
      max-width: 820px;
    }

    .headline em {
      font-style: normal;
      color: #818cf8;
    }

    .bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      max-width: 700px;
    }

    .tag {
      font-family: 'Fragment Mono', monospace;
      font-size: 12px;
      color: #4f5a8a;
      background: rgba(129, 140, 248, 0.04);
      padding: 6px 13px;
      border-radius: 4px;
      border: 1px solid #1e2040;
    }

    .url {
      font-family: 'Fragment Mono', monospace;
      font-size: 13px;
      color: #252850;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="bar"></div>
  <div class="bg-letter">0</div>

  <div class="content">
    <div class="top">
      <div class="brand">platform-<span class="z">zero</span></div>
      <div class="brand-dot"></div>
      <div class="badge">// open source infra lab</div>
    </div>

    <div class="headline">
      From Blank Machine<br>to Full Platform. <em>One Command.</em>
    </div>

    <div class="bottom">
      <div class="tags">
        <span class="tag">Terragrunt</span>
        <span class="tag">Ministack</span>
        <span class="tag">Ansible</span>
        <span class="tag">Kubernetes</span>
        <span class="tag">22 Terraform units</span>
        <span class="tag">dev + staging</span>
      </div>
      <div class="url">75asu.github.io/platform-zero</div>
    </div>
  </div>
</body>
</html>
