---
- name: Tear down awslab on homelab
  hosts: awslab
  gather_facts: false

  tasks:
    - name: Stop and remove all containers
      shell: docker compose down
      args:
        chdir: ~/awslab
      ignore_errors: true

    - name: Remove awslab working directory
      file:
        path: ~/awslab
        state: absent

    - name: Done
      debug:
        msg: "All containers stopped. Homelab is clean."
