services:
  ministack:
    image: ministackorg/ministack:latest
    container_name: awslab-ministack
    ports:
      - "4566:4566"
    environment:
      - MINISTACK_REGION=us-east-1
      - MINISTACK_ACCOUNT_ID=000000000000
      - LOG_LEVEL=INFO
      - PERSIST_STATE=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_ministack/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: awslab-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # Runs once — polls until MinIO accepts connections, then creates the state bucket
  minio-init:
    image: minio/mc:latest
    container_name: awslab-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      count=0;
      until timeout 5 mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do
        count=\$((count+1));
        if [ \$count -ge 20 ]; then echo 'ERROR: MinIO did not start within 40s'; exit 1; fi;
        echo \"Waiting for MinIO... (\$count/20)\" && sleep 2;
      done &&
      mc mb local/platform-zero-tfstate --ignore-existing &&
      echo 'State bucket ready.'
      "
    restart: "no"
