---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared-credentials
  namespace: cloudflared
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: cloudflared-credentials
    creationPolicy: Owner
  data:
    - secretKey: creds.json
      remoteRef:
        key: cloudflare
        property: creds_json
