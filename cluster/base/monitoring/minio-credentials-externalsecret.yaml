---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: minio-credentials
    creationPolicy: Owner
    template:
      data:
        rootUser: "{{ .access_key }}"
        rootPassword: "{{ .secret_key }}"
  data:
    - secretKey: access_key
      remoteRef:
        key: minio
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: minio
        property: secret_key
