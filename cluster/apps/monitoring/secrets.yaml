---
# monitoring-secrets — deploys minio-credentials and thanos-objstore ExternalSecrets.
# kube-prometheus-stack (wave 2) start up.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-secrets
  namespace: argocd
spec:
  project: default

  source:
    repoURL: "http://gitea-http.gitea.svc.cluster.local:3000/admin/platform-zero.git"
    targetRevision: main
    path: cluster/base/monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
