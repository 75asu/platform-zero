---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: act-runner-secrets
  namespace: argocd
spec:
  project: default

  source:
    repoURL: "http://gitea-http.gitea.svc.cluster.local:3000/admin/platform-zero.git"
    targetRevision: main
    path: cluster/base/act-runner

  destination:
    server: https://kubernetes.default.svc
    namespace: gitea-runner

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
